apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload
  namespace: bench
spec:
  replicas: 1
  selector:
    matchLabels: { app: workload }
  template:
    metadata:
      labels: { app: workload }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      # Phase 3: preferred affinity — allows spot agent to steer placement.
      # The RL agent calls K8sActions.set_node_pref() to bias toward spot or ondemand;
      # this base manifest provides no hard constraint so both node pools are reachable.
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 1
            preference:
              matchExpressions:
              - key: node-lifecycle
                operator: In
                values: ["ondemand"]
      containers:
      - name: workload
        image: spot-workload:v1
        imagePullPolicy: IfNotPresent
        ports: [{ containerPort: 8080 }]
        env:
        - { name: WORK_MS, value: "50" }
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits:   { cpu: "300m", memory: "256Mi" }
        readinessProbe:
          httpGet: { path: /healthz, port: 8080 }
