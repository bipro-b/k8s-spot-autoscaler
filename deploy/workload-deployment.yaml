apiVersion: apps/v1
kind: Deployment
metadata:
  name: workload
  namespace: bench
spec:
  replicas: 1
  selector:
    matchLabels: { app: workload }
  template:
    metadata:
      labels: { app: workload }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      # Hard affinity: HPA baseline runs PURELY on the on-demand node.
      # Pods that can't schedule here go Pending rather than spilling to spot.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-lifecycle
                operator: In
                values: ["ondemand"]
      containers:
      - name: workload
        image: spot-workload:v1
        imagePullPolicy: IfNotPresent
        ports: [{ containerPort: 8080 }]
        env:
        - { name: WORK_MS, value: "50" }
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits:   { cpu: "300m", memory: "256Mi" }
        readinessProbe:
          httpGet: { path: /healthz, port: 8080 }
